<div class="progressWrapper">
  <svg viewBox="0 0 240 240" fill="none">
    <circle class="progressTrack" r="100" cx="120" cy="120" />
    <circle class="progressIndicator" r="100" cx="120" cy="120" />
  </svg>
  <div class="bigNumber">0%</div>
</div>

<div class="controls">
  <label for="progressSlider"> Progress: </label>
  <input
    id="progressSlider"
    type="range"
    value="0"
    min="0"
    max="100"
    step="1"
  />
</div>
