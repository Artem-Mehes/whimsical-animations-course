<svg width="240" height="240">
  <circle
    r="120"
    cx="120"
    cy="120"
    fill="hsl(45deg 100% 50%)"
  />

  <ellipse
    cx="80"
    cy="90"
    rx="15"
    ry="20"
    fill="hsl(35deg 80% 20%)"
  />
  <ellipse
    cx="160"
    cy="90"
    rx="15"
    ry="20"
    fill="hsl(35deg 80% 20%)"
  />

  <!-- <line x1="60" x2="180" y1="160" y2="160" stroke="hsl(35deg 80% 20%)" stroke-width="10" stroke-linecap="round" /> -->
  <circle
    r="80"
    cx="120"
    cy="90"
    fill="none"
    stroke="hsl(35deg 80% 20%)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-dasharray="90 2000"
    stroke-dashoffset="-80"
  />
</svg>

<!--
  SVG Cheatsheet

  Circles:
    <circle cx="12" cy="23" r="34" />

  Ovals:
    <ellipse cx="12" cy="23" rx="34" ry="45"  />

  Lines:
    <line x1="12" y1="23" x2="34" y2="45"  />

  Presentational attributes:
    fill="[color]"
    stroke="[color]"
    stroke-width="[number]"
    stroke-linecap="[string]"
    stroke-dasharray="[dash] [gap]"
    stroke-dashoffset="[number]"
-->
